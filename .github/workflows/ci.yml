name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install SpacetimeDB CLI
        run: |
          curl -sSf https://install.spacetimedb.com | sh -s -- -y
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/spacetime" version install 2.2.0 --use -y
          "$HOME/.local/bin/spacetime" --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @elmental/shared build

      - name: Test shared game logic
        run: pnpm --filter @elmental/shared test -- run

      - name: Check shared/backend matrix parity
        run: pnpm test:matrix-parity

      - name: Build SpacetimeDB module
        run: spacetime build --module-path apps/spacetime/spacetimedb

      - name: Build Telegram Mini App
        run: pnpm --filter @elmental/tma build
        env:
          VITE_GAME_TRANSPORT: spacetime
          VITE_GAME_TRACE: 'true'
          VITE_SPACETIME_URI: https://maincloud.spacetimedb.com
          VITE_SPACETIME_DB: elmental-v2
