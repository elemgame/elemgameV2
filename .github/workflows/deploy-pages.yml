name: Deploy TMA to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @elmental/shared build

      - name: Build Telegram Mini App
        run: pnpm --filter @elmental/tma build
        env:
          GITHUB_PAGES: 'true'
          VITE_BUILD_ID: ${{ github.sha }}
          VITE_GAME_TRANSPORT: spacetime
          VITE_GAME_TRACE: 'true'
          VITE_SPACETIME_URI: ${{ vars.VITE_SPACETIME_URI || 'https://maincloud.spacetimedb.com' }}
          VITE_SPACETIME_DB: ${{ vars.VITE_SPACETIME_DB || 'elmental-v2' }}
          VITE_PAYMENTS_URL: ${{ vars.VITE_PAYMENTS_URL }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/tma/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  configure-telegram:
    name: Configure Telegram Bot
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure bot commands and menu button
        run: node scripts/configure-telegram-bot.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME || 'elemgamebot' }}
          TELEGRAM_WEBAPP_URL: ${{ vars.TELEGRAM_WEBAPP_URL || format('{0}?v={1}', needs.deploy.outputs.page_url, github.sha) }}
          TELEGRAM_MENU_CHAT_IDS: ${{ vars.TELEGRAM_MENU_CHAT_IDS }}
          VITE_PAYMENTS_URL: ${{ vars.VITE_PAYMENTS_URL }}
          PAYMENTS_WEBHOOK_SECRET: ${{ secrets.PAYMENTS_WEBHOOK_SECRET || vars.PAYMENTS_WEBHOOK_SECRET }}
