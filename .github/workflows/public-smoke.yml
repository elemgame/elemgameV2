name: Public Multiplayer Smoke

on:
  workflow_dispatch:
    inputs:
      public_tma_url:
        description: Public TMA URL to test
        required: false
        default: https://elemgame.github.io/elemgameV2/
      room:
        description: Optional room name; generated when empty
        required: false
        default: ''

permissions:
  contents: read

jobs:
  public-match:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run public first-to-3 smoke
        run: pnpm smoke:public-match
        env:
          PUBLIC_TMA_URL: ${{ inputs.public_tma_url }}
          SMOKE_ROOM: ${{ inputs.room }}
