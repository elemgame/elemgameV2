<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a1a" />
    <title>Elmental — Elemental Battle</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a1a;
      }
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
    </style>
    <script>
      (function () {
        var buildId = '%VITE_BUILD_ID%';
        if (!buildId || buildId.charAt(0) === '%') return;
        if (window.location.hostname !== 'elemgame.github.io') return;
        if (!window.location.pathname.endsWith('/elemgameV2/')) return;
        if (new URLSearchParams(window.location.search).has('v')) return;
        window.location.replace(window.location.pathname + '?v=' + encodeURIComponent(buildId.slice(0, 12)) + window.location.hash);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
